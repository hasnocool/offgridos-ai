# OffGridOS AI Configuration
ai:
  enabled: true
  
  # Model configuration
  models:
    # Default model for low-end hardware
    default:
      name: "gemma-2b"
      type: "gguf"
      path: "/opt/offgridos/models/gemma-2b-q4_k_m.gguf"
      context_length: 2048
    
    # Model for higher-end hardware
    enhanced:
      name: "llama-7b"
      type: "gguf"
      path: "/opt/offgridos/models/llama-7b-q4_k_m.gguf"
      context_length: 4096

  # Inference settings
  inference:
    threads: 4
    gpu_layers: 0
    temperature: 0.7
    max_tokens: 512

  # RAG configuration
  rag:
    enabled: true
    chunk_size: 512
    chunk_overlap: 50
    embedding_model: "all-MiniLM-L6-v2"
    vector_store: "faiss"
    collection: "knowledge"

  # Knowledge vault integration
  knowledge:
    auto_index: true
    supported_formats:
      - "pdf"
      - "txt"
      - "md"
      - "html"
